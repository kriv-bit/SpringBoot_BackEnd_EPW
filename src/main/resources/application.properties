spring.application.name=activities
server.port=8080
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/activities_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver
# Para empezar rápido: crea/actualiza tablas automáticamente
spring.jpa.hibernate.ddl-auto=update
# Buenas prácticas
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
# Logs SQL (opcional)
spring.jpa.show-sql=true

# JWT Config
jwt.secret=${JWT_SECRET:clave-super-secreta-de-al-menos-32-caracteres-aqui}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
# 86400000 ms = 24 horas

# CORS (orígenes permitidos para el frontend, separados por coma)
# Toma el valor de la variable de entorno CORS_ALLOWED_ORIGINS;
# si no está definida, usa localhost:5173 por defecto.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
